# Coverage scope & 90% gate — see adr/0020-test-coverage-scoping-and-gate.md.
# All runtime logic is in scope; the barrel re-export and test files are not.
# The threshold is enforced only under `--coverage` (the `test:coverage`
# script), so plain `bun test` / CI `check` are unaffected.
[test]
coverageReporter = ["text"]
coverageThreshold = 0.9
coveragePathIgnorePatterns = [
  # @nafios/supabase-core is loaded transitively (its client factory) but owned
  # and measured by its own package — never counted against this gate.
  "**/supabase-core/**",
  "**/index.ts",
  "**/tests/**",
]
